<app-math-workbench
  eyebrow="Geometry"
  title="Triangle explorer"
  description="Phase 1 geometry slice for shape measurements, rigid rotation, and centroid intuition on the shared Canvas workbench."
  [highlights]="highlights"
  [actions]="actions"
  [keyboardShortcuts]="keyboardShortcuts"
  [statusMessage]="statusMessage()"
  (actionTriggered)="handleWorkbenchAction($event)"
>
  <div workbench-controls class="controls">
    <app-workbench-control-section
      heading="Triangle controls"
      headingId="triangle-controls-heading"
    >
      @for (control of rangeControls; track control.id) {
        <app-workbench-range-control
          [label]="control.label"
          [min]="control.min"
          [max]="control.max"
          [step]="control.step"
          [value]="rangeValue(control.id)"
          [displayValue]="rangeDisplayValue(control.id)"
          (valueChanged)="updateRange(control.id, $event)"
        />
      }
    </app-workbench-control-section>

    <app-workbench-control-section heading="Display options" headingId="triangle-display-heading">
      @for (control of toggleControls; track control.id) {
        <app-workbench-toggle-control
          [label]="control.label"
          [checked]="toggleValue(control.id)"
          (valueChanged)="toggleOption(control.id, $event)"
        />
      }
    </app-workbench-control-section>

    <app-workbench-control-section heading="Presets" headingId="triangle-presets-heading">
      <app-workbench-preset-grid
        [presets]="presets"
        (presetSelected)="applyPresetByIndex($event)"
      />
    </app-workbench-control-section>
  </div>

  <div workbench-viewport class="viewport">
    <app-workbench-viewport-surface
      ariaLabel="Triangle graph viewport"
      (keyPressed)="handleViewportKeydown($event)"
    >
      <canvas
        #canvas
        class="viewport__canvas"
        width="720"
        height="480"
        aria-label="Cartesian plane displaying the current triangle"
      ></canvas>
    </app-workbench-viewport-surface>

    <app-workbench-metric-grid [metrics]="metrics()" />
  </div>

  <div workbench-notes class="notes">
    <p>
      This geometry slice keeps the same preset, action, and serialized-state model as the algebra
      and linear algebra tools while adding concrete measurement feedback.
    </p>
    <p>{{ summary() }}</p>
  </div>
</app-math-workbench>

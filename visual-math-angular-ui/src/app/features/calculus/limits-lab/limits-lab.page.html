<app-math-workbench
  eyebrow="Calculus"
  title="Limits lab"
  description="Weekly-math calculus slice for removable discontinuities, left/right-hand samples, and limit intuition on the shared Canvas workbench."
  [highlights]="highlights"
  [actions]="actions"
  [keyboardShortcuts]="keyboardShortcuts"
  [statusMessage]="statusMessage()"
  (actionTriggered)="handleWorkbenchAction($event)"
>
  <div workbench-controls class="controls">
    <app-workbench-control-section heading="Limit controls" headingId="limits-controls-heading">
      @for (control of rangeControls; track control.id) {
        <app-workbench-range-control
          [label]="control.label"
          [min]="control.min"
          [max]="control.max"
          [step]="control.step"
          [value]="rangeValue(control.id)"
          [displayValue]="rangeDisplayValue(control.id)"
          (valueChanged)="updateRange(control.id, $event)"
        />
      }
    </app-workbench-control-section>

    <app-workbench-control-section heading="Display options" headingId="limits-display-heading">
      @for (control of toggleControls; track control.id) {
        <app-workbench-toggle-control
          [label]="control.label"
          [checked]="toggleValue(control.id)"
          (valueChanged)="toggleOption(control.id, $event)"
        />
      }
    </app-workbench-control-section>

    <app-workbench-control-section heading="Presets" headingId="limits-presets-heading">
      <app-workbench-preset-grid
        [presets]="presets"
        (presetSelected)="applyPresetByIndex($event)"
      />
    </app-workbench-control-section>
  </div>

  <div workbench-viewport class="viewport">
    <app-workbench-viewport-surface
      ariaLabel="Limits graph viewport"
      (keyPressed)="handleViewportKeydown($event)"
    >
      <canvas
        #canvas
        class="viewport__canvas"
        width="720"
        height="480"
        aria-label="Curve with a removable discontinuity and left/right approach markers"
      ></canvas>
    </app-workbench-viewport-surface>

    <app-workbench-metric-grid [metrics]="metrics()" />
  </div>

  <div workbench-notes class="notes">
    <p>
      This slice complements the derivative and integral labs by focusing on what happens near a
      point rather than on slope or accumulated area.
    </p>
    <p>{{ summary() }}</p>
  </div>
</app-math-workbench>

<app-math-workbench
  eyebrow="Statistics and Probability"
  title="Sampling lab"
  description="Phase 1 statistics slice for repeated Bernoulli experiments, deterministic sampling, and histogram-based probability intuition."
  [highlights]="highlights"
  [actions]="actions"
  [keyboardShortcuts]="keyboardShortcuts"
  [statusMessage]="statusMessage()"
  (actionTriggered)="handleWorkbenchAction($event)"
>
  <div workbench-controls class="controls">
    <app-workbench-control-section
      heading="Sampling controls"
      headingId="sampling-controls-heading"
    >
      @for (control of rangeControls; track control.id) {
        <app-workbench-range-control
          [label]="control.label"
          [min]="control.min"
          [max]="control.max"
          [step]="control.step"
          [value]="rangeValue(control.id)"
          [displayValue]="rangeDisplayValue(control.id)"
          (valueChanged)="updateRange(control.id, $event)"
        />
      }
    </app-workbench-control-section>

    <app-workbench-control-section heading="Display options" headingId="sampling-display-heading">
      @for (control of toggleControls; track control.id) {
        <app-workbench-toggle-control
          [label]="control.label"
          [checked]="toggleValue(control.id)"
          (valueChanged)="toggleOption(control.id, $event)"
        />
      }
    </app-workbench-control-section>

    <app-workbench-control-section heading="Presets" headingId="sampling-presets-heading">
      <app-workbench-preset-grid
        [presets]="presets"
        (presetSelected)="applyPresetByIndex($event)"
      />
    </app-workbench-control-section>
  </div>

  <div workbench-viewport class="viewport">
    <app-workbench-viewport-surface
      ariaLabel="Sampling histogram viewport"
      (keyPressed)="handleViewportKeydown($event)"
    >
      <canvas
        #canvas
        class="viewport__canvas"
        width="720"
        height="480"
        aria-label="Histogram of successes across repeated Bernoulli experiments"
      ></canvas>
    </app-workbench-viewport-surface>

    <app-workbench-metric-grid [metrics]="metrics()" />
  </div>

  <div workbench-notes class="notes">
    <p>
      The seeded simulator keeps the histogram deterministic for tests, share links, and later
      renderer phases while still feeling interactive.
    </p>
    <p>{{ summary() }}</p>
  </div>
</app-math-workbench>

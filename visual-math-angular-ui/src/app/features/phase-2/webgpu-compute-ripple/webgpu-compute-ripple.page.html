<app-math-workbench
  eyebrow="Phase 2"
  title="WebGPU compute ripple"
  description="Tenth Angular WebGPU route introducing a compute pass that writes geometry before a render pass consumes the GPU-written vertices."
  [highlights]="highlights"
  [actions]="actions"
  [keyboardShortcuts]="keyboardShortcuts"
  [statusMessage]="statusMessage()"
  (actionTriggered)="handleWorkbenchAction($event)"
>
  <div workbench-controls class="controls">
    <app-workbench-control-section
      heading="Compute ripple controls"
      headingId="webgpu-compute-ripple-controls-heading"
    >
      @for (control of rangeControls; track control.id) {
        <app-workbench-range-control
          [label]="control.label"
          [min]="control.min"
          [max]="control.max"
          [step]="control.step"
          [value]="rangeValue(control.id)"
          [displayValue]="rangeDisplayValue(control.id)"
          (valueChanged)="updateRange(control.id, $event)"
        />
      }
    </app-workbench-control-section>

    <app-workbench-control-section
      heading="Presets"
      headingId="webgpu-compute-ripple-presets-heading"
    >
      <app-workbench-preset-grid
        [presets]="presets"
        (presetSelected)="applyPresetByIndex($event)"
      />
    </app-workbench-control-section>
  </div>

  <div workbench-viewport class="viewport">
    <app-workbench-viewport-surface
      ariaLabel="WebGPU compute-ripple viewport"
      (keyPressed)="handleViewportKeydown($event)"
    >
      <canvas
        #canvas
        class="viewport__canvas"
        width="720"
        height="480"
        aria-label="WebGPU canvas showing a compute-generated ripple scene"
      ></canvas>
    </app-workbench-viewport-surface>

    <app-workbench-metric-grid [metrics]="metrics()" />
  </div>

  <div workbench-notes class="notes">
    <p>
      This Phase 2 route keeps the shared Angular workbench shell while adding a compute shader that
      writes interleaved vertex data before the render pass draws those GPU-generated results.
    </p>
    <p>{{ summary() }}</p>
  </div>
</app-math-workbench>

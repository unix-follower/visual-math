<app-math-workbench
  eyebrow="Phase 2"
  title="WebGPU sampler wave"
  description="Eighth Angular WebGPU route introducing a real sampler so a small uploaded texture is filtered across a quad rather than read only with integer texel loads."
  [highlights]="highlights"
  [actions]="actions"
  [keyboardShortcuts]="keyboardShortcuts"
  [statusMessage]="statusMessage()"
  (actionTriggered)="handleWorkbenchAction($event)"
>
  <div workbench-controls class="controls">
    <app-workbench-control-section
      heading="Sampler wave controls"
      headingId="webgpu-sampler-wave-controls-heading"
    >
      @for (control of rangeControls; track control.id) {
        <app-workbench-range-control
          [label]="control.label"
          [min]="control.min"
          [max]="control.max"
          [step]="control.step"
          [value]="rangeValue(control.id)"
          [displayValue]="rangeDisplayValue(control.id)"
          (valueChanged)="updateRange(control.id, $event)"
        />
      }
    </app-workbench-control-section>

    <app-workbench-control-section
      heading="Presets"
      headingId="webgpu-sampler-wave-presets-heading"
    >
      <app-workbench-preset-grid
        [presets]="presets"
        (presetSelected)="applyPresetByIndex($event)"
      />
    </app-workbench-control-section>
  </div>

  <div workbench-viewport class="viewport">
    <app-workbench-viewport-surface
      ariaLabel="WebGPU sampler wave viewport"
      (keyPressed)="handleViewportKeydown($event)"
    >
      <canvas
        #canvas
        class="viewport__canvas"
        width="720"
        height="480"
        aria-label="WebGPU canvas showing a sampler-filtered wave texture"
      ></canvas>
    </app-workbench-viewport-surface>

    <app-workbench-metric-grid [metrics]="metrics()" />
  </div>

  <div workbench-notes class="notes">
    <p>
      This Phase 2 route keeps the same Angular workbench shell and guarded WebGPU bootstrap flow
      while adding a real sampler so filtered texture sampling becomes part of the WebGPU reference
      set.
    </p>
    <p>{{ summary() }}</p>
  </div>
</app-math-workbench>

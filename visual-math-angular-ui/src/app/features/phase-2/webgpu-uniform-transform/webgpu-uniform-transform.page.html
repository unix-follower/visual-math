<app-math-workbench
  eyebrow="Phase 2"
  title="WebGPU uniform transform"
  description="Fifth Angular WebGPU route introducing a true uniform buffer so transform and tint updates move into GPU-side parameters rather than CPU-side geometry rewrites."
  [highlights]="highlights"
  [actions]="actions"
  [keyboardShortcuts]="keyboardShortcuts"
  [statusMessage]="statusMessage()"
  (actionTriggered)="handleWorkbenchAction($event)"
>
  <div workbench-controls class="controls">
    <app-workbench-control-section
      heading="Uniform transform controls"
      headingId="webgpu-uniform-transform-controls-heading"
    >
      @for (control of rangeControls; track control.id) {
        <app-workbench-range-control
          [label]="control.label"
          [min]="control.min"
          [max]="control.max"
          [step]="control.step"
          [value]="rangeValue(control.id)"
          [displayValue]="rangeDisplayValue(control.id)"
          (valueChanged)="updateRange(control.id, $event)"
        />
      }
    </app-workbench-control-section>

    <app-workbench-control-section
      heading="Presets"
      headingId="webgpu-uniform-transform-presets-heading"
    >
      <app-workbench-preset-grid
        [presets]="presets"
        (presetSelected)="applyPresetByIndex($event)"
      />
    </app-workbench-control-section>
  </div>

  <div workbench-viewport class="viewport">
    <app-workbench-viewport-surface
      ariaLabel="WebGPU uniform transform viewport"
      (keyPressed)="handleViewportKeydown($event)"
    >
      <canvas
        #canvas
        class="viewport__canvas"
        width="720"
        height="480"
        aria-label="WebGPU canvas showing a uniform-buffer transformed mesh"
      ></canvas>
    </app-workbench-viewport-surface>

    <app-workbench-metric-grid [metrics]="metrics()" />
  </div>

  <div workbench-notes class="notes">
    <p>
      This Phase 2 route keeps the same Angular workbench shell, cached renderer resources, and
      guarded WebGPU bootstrap path while moving transform and tint state into a uniform buffer that
      the shader reads directly.
    </p>
    <p>{{ summary() }}</p>
  </div>
</app-math-workbench>

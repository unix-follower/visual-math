<app-math-workbench
  eyebrow="Phase 2"
  title="WebGPU pulse diamond"
  description="Fourth Angular WebGPU route introducing requestAnimationFrame-driven per-frame updates so the viewport moves beyond static scenes into animated GPU-backed motion."
  [highlights]="highlights"
  [actions]="actions"
  [keyboardShortcuts]="keyboardShortcuts"
  [statusMessage]="statusMessage()"
  (actionTriggered)="handleWorkbenchAction($event)"
>
  <div workbench-controls class="controls">
    <app-workbench-control-section
      heading="Pulse diamond controls"
      headingId="webgpu-pulse-diamond-controls-heading"
    >
      @for (control of rangeControls; track control.id) {
        <app-workbench-range-control
          [label]="control.label"
          [min]="control.min"
          [max]="control.max"
          [step]="control.step"
          [value]="rangeValue(control.id)"
          [displayValue]="rangeDisplayValue(control.id)"
          (valueChanged)="updateRange(control.id, $event)"
        />
      }
    </app-workbench-control-section>

    <app-workbench-control-section
      heading="Presets"
      headingId="webgpu-pulse-diamond-presets-heading"
    >
      <app-workbench-preset-grid
        [presets]="presets"
        (presetSelected)="applyPresetByIndex($event)"
      />
    </app-workbench-control-section>
  </div>

  <div workbench-viewport class="viewport">
    <app-workbench-viewport-surface
      ariaLabel="WebGPU pulse diamond viewport"
      (keyPressed)="handleViewportKeydown($event)"
    >
      <canvas
        #canvas
        class="viewport__canvas"
        width="720"
        height="480"
        aria-label="WebGPU canvas showing an animated pulsing diamond"
      ></canvas>
    </app-workbench-viewport-surface>

    <app-workbench-metric-grid [metrics]="metrics()" />
  </div>

  <div workbench-notes class="notes">
    <p>
      This fourth Phase 2 route keeps the same Angular workbench, cached renderer resources, and
      guarded WebGPU bootstrap path while adding a route-local animation loop that updates the GPU
      vertex payload every frame.
    </p>
    <p>{{ summary() }}</p>
  </div>
</app-math-workbench>

<app-math-workbench
  eyebrow="Phase 3"
  title="WebGL uniform transform"
  description="WebGL route validating matrix-uniform transforms, cached static geometry, and uniform-driven accent blending inside the shared workbench shell."
  [highlights]="highlights"
  [actions]="actions"
  [keyboardShortcuts]="keyboardShortcuts"
  [statusMessage]="statusMessage()"
  (actionTriggered)="handleWorkbenchAction($event)"
>
  <div workbench-controls class="controls">
    <app-workbench-control-section
      heading="Transform controls"
      headingId="webgl-uniform-transform-controls-heading"
    >
      @for (control of rangeControls; track control.id) {
        <app-workbench-range-control
          [label]="control.label"
          [min]="control.min"
          [max]="control.max"
          [step]="control.step"
          [value]="rangeValue(control.id)"
          [displayValue]="rangeDisplayValue(control.id)"
          (valueChanged)="updateRange(control.id, $event)"
        />
      }
    </app-workbench-control-section>

    <app-workbench-control-section
      heading="Presets"
      headingId="webgl-uniform-transform-presets-heading"
    >
      <app-workbench-preset-grid
        [presets]="presets"
        (presetSelected)="applyPresetByIndex($event)"
      />
    </app-workbench-control-section>
  </div>

  <div workbench-viewport class="viewport">
    <app-workbench-viewport-surface
      ariaLabel="WebGL uniform transform viewport"
      (keyPressed)="handleViewportKeydown($event)"
    >
      <canvas
        #canvas
        class="viewport__canvas"
        width="720"
        height="480"
        aria-label="WebGL canvas showing a uniform-transformed panel"
      ></canvas>
    </app-workbench-viewport-surface>

    <app-workbench-metric-grid [metrics]="metrics()" />
  </div>

  <div workbench-notes class="notes">
    <p>
      This route keeps one static mesh on the GPU and changes only uniforms during interaction. That
      makes the transform path materially different from the gradient triangle route, which still
      rebuilds vertex data per scene update.
    </p>
    <p>{{ summary() }}</p>
  </div>
</app-math-workbench>

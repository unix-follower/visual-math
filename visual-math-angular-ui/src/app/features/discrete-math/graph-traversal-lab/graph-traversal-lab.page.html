<app-math-workbench
  eyebrow="Discrete Math"
  title="Graph traversal lab"
  description="Weekly-math discrete slice for breadth-first versus depth-first search, visit order, and path intuition on a fixed graph using the shared Canvas workbench."
  [highlights]="highlights"
  [actions]="actions"
  [keyboardShortcuts]="keyboardShortcuts"
  [statusMessage]="statusMessage()"
  (actionTriggered)="handleWorkbenchAction($event)"
>
  <div workbench-controls class="controls">
    <app-workbench-control-section
      heading="Traversal controls"
      headingId="graph-traversal-controls-heading"
    >
      @for (control of rangeControls; track control.id) {
        <app-workbench-range-control
          [label]="control.label"
          [min]="control.min"
          [max]="control.max"
          [step]="control.step"
          [value]="rangeValue(control.id)"
          [displayValue]="rangeDisplayValue(control.id)"
          (valueChanged)="updateRange(control.id, $event)"
        />
      }
    </app-workbench-control-section>

    <app-workbench-control-section
      heading="Display options"
      headingId="graph-traversal-display-heading"
    >
      @for (control of toggleControls; track control.id) {
        <app-workbench-toggle-control
          [label]="control.label"
          [checked]="toggleValue(control.id)"
          (valueChanged)="toggleOption(control.id, $event)"
        />
      }
    </app-workbench-control-section>

    <app-workbench-control-section heading="Presets" headingId="graph-traversal-presets-heading">
      <app-workbench-preset-grid
        [presets]="presets"
        (presetSelected)="applyPresetByIndex($event)"
      />
    </app-workbench-control-section>
  </div>

  <div workbench-viewport class="viewport">
    <app-workbench-viewport-surface
      ariaLabel="Graph traversal viewport"
      (keyPressed)="handleViewportKeydown($event)"
    >
      <canvas
        #canvas
        class="viewport__canvas"
        width="720"
        height="480"
        aria-label="Graph showing traversal order and revealed path"
      ></canvas>
    </app-workbench-viewport-surface>

    <app-workbench-metric-grid [metrics]="metrics()" />
  </div>

  <div workbench-notes class="notes">
    <p>
      This discrete-math slice keeps the same share, export, preset, and keyboard contract while
      shifting from continuous graphs to finite traversal logic.
    </p>
    <p>{{ summary() }}</p>
  </div>
</app-math-workbench>
